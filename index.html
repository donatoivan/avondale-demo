<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formation Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch: #2d7a3a;
    --bench-bg: #0f1923;
    --panel-bg: #162130;
    --card-bg: #1c2d3f;
    --accent: #00d4ff;
    --blue: #3b82f6;
    --orange: #f97316;
    --red: #ef4444;
    --text: #e8f0f8;
    --muted: #6b8aaa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: #080e14;
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--bench-bg);
    border-bottom: 2px solid rgba(0,212,255,0.2);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    height: 62px;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .logo span { color: var(--text); }

  .timer-section { display: flex; align-items: center; gap: 12px; }

  .timer-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 40px;
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.4);
    min-width: 100px;
    text-align: center;
    transition: color 0.5s;
  }
  .timer-display.warning { color: var(--orange); text-shadow: 0 0 20px rgba(249,115,22,0.4); }
  .timer-display.danger  { color: var(--red);    text-shadow: 0 0 20px rgba(239,68,68,0.4); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

  .timer-btn {
    background: none;
    border: 2px solid currentColor;
    color: var(--accent);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 16px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 3px;
  }
  .timer-btn:hover { background: rgba(0,212,255,0.1); }
  .timer-btn.stop  { color: var(--red);   border-color: var(--red); }
  .timer-btn.stop:hover { background: rgba(239,68,68,0.1); }
  .timer-btn.reset { color: var(--muted); border-color: var(--muted); }
  .timer-btn.reset:hover { color: var(--text); }

  /* Layout */
  .app-layout {
    display: grid;
    grid-template-columns: 1fr 310px;
    height: calc(100vh - 62px);
  }

  /* Pitch */
  .pitch-container {
    background: var(--pitch);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pitch-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      180deg,
      transparent 0, transparent 70px,
      rgba(0,0,0,0.055) 70px, rgba(0,0,0,0.055) 140px
    );
    pointer-events: none;
  }

  .pitch-inner {
    position: relative;
    width: min(860px, 96%);
    height: min(460px, calc(100vh - 90px));
    border: 2px solid rgba(255,255,255,0.45);
    border-radius: 4px;
  }

  /* Pitch markings helper */
  .pm { position: absolute; pointer-events: none; }

  /* Formation zones — horizontal columns */
  .formation-zone {
    position: absolute;
    top: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-evenly;
    padding: 32px 0;
  }

  .zone-gk  { left: 7%;  width: 80px; transform: translateX(-50%); }
  .zone-def { left: 26%; width: 80px; transform: translateX(-50%); }
  .zone-mid { left: 51%; width: 80px; transform: translateX(-50%); }
  .zone-fwd { left: 76%; width: 80px; transform: translateX(-50%); }

  /* Player slot wrapper */
  .player-slot {
    position: relative;
    width: 78px;
    height: 78px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* Empty slot */
  .empty-slot {
    width: 78px;
    height: 78px;
    border-radius: 50%;
    border: 2px dashed rgba(255,255,255,0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: rgba(0,0,0,0.08);
  }
  .empty-slot:hover {
    border-color: rgba(255,255,255,0.65);
    background: rgba(255,255,255,0.1);
  }
  .empty-slot::after {
    content: '+';
    color: rgba(255,255,255,0.3);
    font-size: 28px;
    font-weight: 200;
  }

  /* Player token */
  .player-token {
    width: 78px;
    height: 78px;
    border-radius: 50%;
    background: var(--blue);
    border: 3px solid rgba(255,255,255,0.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    transition: background 0.4s, box-shadow 0.3s, transform 0.15s;
    box-shadow: 0 4px 18px rgba(0,0,0,0.45);
    user-select: none;
    padding: 6px;
    overflow: hidden;
  }
  .player-token:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(0,0,0,0.6); }
  .player-token.orange { background: var(--orange); border-color: rgba(255,255,255,0.75); }
  .player-token.red    { background: var(--red);    border-color: #fff; animation: token-pulse 1.1s infinite; }
  .player-token.yellow { background: #eab308; border-color: #fff; }
  .bench-avatar.yellow { background: #eab308; }

  @keyframes token-pulse {
    0%,100% { box-shadow: 0 4px 18px rgba(239,68,68,0.45); }
    50%      { box-shadow: 0 4px 36px rgba(239,68,68,1); }
  }

  .p-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 14px;
    line-height: 1;
    color: #fff;
    text-align: center;
    max-width: 68px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .p-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.88);
    line-height: 1;
  }

  /* Position label */
  .pos-label {
    position: absolute;
    bottom: -19px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.38);
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
  }

  /* Tooltip */
  .tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #07111a;
    border: 1px solid rgba(0,212,255,0.35);
    border-radius: 4px;
    padding: 5px 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 20;
  }
  .player-slot:hover .tooltip { opacity: 1; }

  /* Sidebar */
  .sidebar {
    background: var(--bench-bg);
    border-left: 1px solid rgba(255,255,255,0.07);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .bench-count {
    background: rgba(0,212,255,0.15);
    color: var(--accent);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
  }

  /* Add player */
  .add-player-row {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    gap: 6px;
  }

  .add-player-input {
    flex: 1;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-player-input::placeholder { color: var(--muted); }
  .add-player-input:focus { border-color: var(--accent); }

  .add-player-btn {
    background: rgba(0,212,255,0.12);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .add-player-btn:hover { background: rgba(0,212,255,0.22); }

  .bench-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .bench-list::-webkit-scrollbar { width: 3px; }
  .bench-list::-webkit-scrollbar-track { background: transparent; }
  .bench-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .bench-player {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .bench-player::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--blue);
    opacity: 0;
    transition: background 0.4s, opacity 0.2s;
  }
  .bench-player.on-field { border-color: rgba(59,130,246,0.22); }
  .bench-player.on-field::before { opacity: 1; }
  .bench-player.on-field.orange { border-color: rgba(249,115,22,0.22); }
  .bench-player.on-field.orange::before { background: var(--orange); }
  .bench-player.on-field.red    { border-color: rgba(239,68,68,0.22); }
  .bench-player.on-field.red::before    { background: var(--red); }

  .bench-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 10px;
    color: white;
    flex-shrink: 0;
    transition: background 0.4s;
    text-align: center;
    padding: 2px;
    line-height: 1.1;
    overflow: hidden;
  }
  .bench-avatar.orange { background: var(--orange); }
  .bench-avatar.red    { background: var(--red); }

  .bench-info { flex: 1; min-width: 0; }

  .bench-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bench-status { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .bench-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .bench-time.orange { color: var(--orange); }
  .bench-time.red    { color: var(--red); }

  .bench-remove-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.15);
    font-size: 14px;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
    border-radius: 3px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .bench-remove-btn:hover { color: var(--red); background: rgba(239,68,68,0.1); }

  .tag-on {
    background: rgba(59,130,246,0.2);
    color: #93c5fd;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 0.8px;
  }

  /* Stats panel */
  .stats-panel {
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 10px 16px;
  }
  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
  }
  .stat-label {
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 11px;
  }
  .stat-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; }
  .stat-val.orange { color: var(--orange); }
  .stat-val.red    { color: var(--red); }

  /* Legend */
  .legend {
    padding: 8px 16px 10px;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
  .legend-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--panel-bg);
    border: 1px solid rgba(0,212,255,0.22);
    border-radius: 10px;
    width: 320px;
    max-height: 500px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.85);
    overflow: hidden;
  }

  .modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 0 2px;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body { overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }

  .modal-player {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 6px;
    padding: 9px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-player:hover { border-color: var(--accent); background: rgba(0,212,255,0.08); }

  .modal-actions {
    padding: 10px 14px;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    gap: 8px;
  }

  .btn-remove {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--red);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 9px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
  }
  .btn-remove:hover { background: rgba(239,68,68,0.2); }

  .btn-cancel {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 9px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { color: var(--text); }

  .empty-squad-msg {
    text-align: center;
    padding: 24px 12px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.5px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Formation<span>Track</span></div>
  <div class="timer-section">
    <div class="timer-display" id="timerDisplay">00:00</div>
    <button class="timer-btn" id="startBtn" onclick="toggleTimer()">START</button>
    <button class="timer-btn reset" onclick="resetTimer()">RESET</button>
  </div>
  <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);letter-spacing:1px;">
    1 – 2 – 3 – 1
  </div>
</header>

<div class="app-layout">

  <!-- PITCH -->
  <div class="pitch-container">
    <div class="pitch-inner" id="pitchInner">

      <!-- Pitch markings -->
      <div class="pm" style="top:0;bottom:0;left:50%;width:2px;background:rgba(255,255,255,0.32);"></div>
      <div class="pm" style="top:50%;left:50%;transform:translate(-50%,-50%);width:110px;height:110px;border-radius:50%;border:2px solid rgba(255,255,255,0.32);"></div>
      <div class="pm" style="top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);"></div>
      <div class="pm" style="top:18%;bottom:18%;left:0;width:17%;border:2px solid rgba(255,255,255,0.32);border-left:none;"></div>
      <div class="pm" style="top:32%;bottom:32%;left:0;width:7%;border:2px solid rgba(255,255,255,0.26);border-left:none;"></div>
      <div class="pm" style="top:50%;left:12%;transform:translate(-50%,-50%);width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.42);"></div>
      <div class="pm" style="top:18%;bottom:18%;right:0;width:17%;border:2px solid rgba(255,255,255,0.32);border-right:none;"></div>
      <div class="pm" style="top:32%;bottom:32%;right:0;width:7%;border:2px solid rgba(255,255,255,0.26);border-right:none;"></div>
      <div class="pm" style="top:50%;right:12%;transform:translate(50%,-50%);width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.42);"></div>

      <!-- GK (1) -->
      <div class="formation-zone zone-gk">
        <div class="player-slot" onclick="slotClick('gk',0)">
          <div class="empty-slot" id="slot-gk-0"></div>
          <div class="tooltip" id="tip-gk-0"></div>
          <span class="pos-label">GK</span>
        </div>
      </div>

      <!-- DEF (2): LD top, RD bottom -->
      <div class="formation-zone zone-def">
        <div class="player-slot" onclick="slotClick('def',0)">
          <div class="empty-slot" id="slot-def-0"></div>
          <div class="tooltip" id="tip-def-0"></div>
          <span class="pos-label">LD</span>
        </div>
        <div class="player-slot" onclick="slotClick('def',1)">
          <div class="empty-slot" id="slot-def-1"></div>
          <div class="tooltip" id="tip-def-1"></div>
          <span class="pos-label">RD</span>
        </div>
      </div>

      <!-- MID (3): LM, CM, RM -->
      <div class="formation-zone zone-mid">
        <div class="player-slot" onclick="slotClick('mid',0)">
          <div class="empty-slot" id="slot-mid-0"></div>
          <div class="tooltip" id="tip-mid-0"></div>
          <span class="pos-label">LM</span>
        </div>
        <div class="player-slot" onclick="slotClick('mid',1)">
          <div class="empty-slot" id="slot-mid-1"></div>
          <div class="tooltip" id="tip-mid-1"></div>
          <span class="pos-label">CM</span>
        </div>
        <div class="player-slot" onclick="slotClick('mid',2)">
          <div class="empty-slot" id="slot-mid-2"></div>
          <div class="tooltip" id="tip-mid-2"></div>
          <span class="pos-label">RM</span>
        </div>
      </div>

      <!-- ST (1) -->
      <div class="formation-zone zone-fwd">
        <div class="player-slot" onclick="slotClick('fwd',0)">
          <div class="empty-slot" id="slot-fwd-0"></div>
          <div class="tooltip" id="tip-fwd-0"></div>
          <span class="pos-label">ST</span>
        </div>
      </div>

    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      Squad
      <span class="bench-count" id="benchCount">0</span>
    </div>

    <div class="add-player-row">
      <input
        class="add-player-input"
        id="newPlayerInput"
        type="text"
        placeholder="Player name…"
        maxlength="20"
        onkeydown="if(event.key==='Enter') addPlayer()"
      />
      <button class="add-player-btn" onclick="addPlayer()">+ Add</button>
    </div>

    <div class="bench-list" id="benchList">
      <div class="empty-squad-msg">Add players above<br>to build your squad.</div>
    </div>

    <div class="stats-panel">
      <div class="stats-row">
        <span class="stat-label">On Field</span>
        <span class="stat-val" id="statOnField">0 / 7</span>
      </div>
      <div class="stats-row">
        <span class="stat-label">Warnings (&gt;5m)</span>
        <span class="stat-val orange" id="statOrange">0</span>
      </div>
      <div class="stats-row">
        <span class="stat-label">Critical (&gt;10m)</span>
        <span class="stat-val red" id="statRed">0</span>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Fresh (&lt;5m)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Warn (5m+)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Crit (10m+)</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="pickModal">
  <div class="modal">
    <div class="modal-header">
      <span id="modalTitle">SELECT PLAYER</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────

const SLOTS = {
  gk:  [null],
  def: [null, null],
  mid: [null, null, null],
  fwd: [null],
};

const POS_LABELS = {
  'gk-0':'GK', 'def-0':'LD', 'def-1':'RD',
  'mid-0':'LM', 'mid-1':'CM', 'mid-2':'RM', 'fwd-0':'ST'
};

// Player object:
//   id, name
//   onField           – currently on the pitch
//   slot              – e.g. "mid-1" or null
//   totalFieldSeconds – cumulative total across all spells (info only)
//   currentSpellSeconds – seconds since they LAST stepped onto field (resets to 0 when benched)
//
// COLOUR LOGIC:
//   Blue   → currentSpellSeconds < 300  (or off-field)
//   Orange → currentSpellSeconds >= 300 && < 600
//   Red    → currentSpellSeconds >= 600
//   When a player is subbed OFF, currentSpellSeconds resets to 0.
//   When they come back ON, it starts fresh from 0.

let players = [];
let nextId = 0;
let timerRunning = false;
let gameSeconds = 0;
let intervalId = null;

// ── Helpers ────────────────────────────────────────────────────────────────

function formatTime(s) {
  const m   = String(Math.floor(s / 60)).padStart(2, '0');
  const sec = String(s % 60).padStart(2, '0');
  return `${m}:${sec}`;
}

// First name, capped at 9 chars for token display
function displayName(name) {
  const first = name.trim().split(/\s+/)[0];
  return first.length > 9 ? first.slice(0, 8) + '…' : first;
}

// Color class based on current spell (not total)
// GK slot is always yellow regardless of time
function colorClass(p) {
  if (p.slot === 'gk-0') return 'yellow';
  if (!p.onField) return ''; // always blue on bench
  if (p.currentSpellSeconds >= 600) return 'red';
  if (p.currentSpellSeconds >= 300) return 'orange';
  return '';
}

// ── Timer ──────────────────────────────────────────────────────────────────

function toggleTimer() {
  if (timerRunning) {
    timerRunning = false;
    clearInterval(intervalId);
    document.getElementById('startBtn').textContent = 'START';
    document.getElementById('startBtn').classList.remove('stop');
  } else {
    timerRunning = true;
    intervalId = setInterval(tick, 1000);
    document.getElementById('startBtn').textContent = 'PAUSE';
    document.getElementById('startBtn').classList.add('stop');
  }
}

function resetTimer() {
  timerRunning = false;
  clearInterval(intervalId);
  gameSeconds = 0;
  players.forEach(p => {
    p.totalFieldSeconds    = 0;
    p.currentSpellSeconds  = 0;
  });
  document.getElementById('startBtn').textContent = 'START';
  document.getElementById('startBtn').classList.remove('stop');
  updateAll();
}

function tick() {
  gameSeconds++;
  players.forEach(p => {
    if (p.onField) {
      p.totalFieldSeconds++;
      p.currentSpellSeconds++;
    }
  });
  updateAll();
}

// ── Squad management ───────────────────────────────────────────────────────

function addPlayer() {
  const input = document.getElementById('newPlayerInput');
  const name  = input.value.trim();
  if (!name) return;

  players.push({
    id: nextId++,
    name,
    onField: false,
    slot: null,
    totalFieldSeconds:   0,
    currentSpellSeconds: 0,
  });

  input.value = '';
  input.focus();
  updateAll();
}

function removePlayerFromSquad(id) {
  const p = players.find(pl => pl.id === id);
  if (!p) return;
  if (p.onField && p.slot) {
    const parts = p.slot.split('-');
    const zone  = parts[0];
    const idx   = parseInt(parts[1]);
    SLOTS[zone][idx] = null;
  }
  players = players.filter(pl => pl.id !== id);
  updateAll();
}

// ── Slot interactions ──────────────────────────────────────────────────────

function getSlotPlayer(zone, idx) {
  const pid = SLOTS[zone][idx];
  return pid !== null ? players.find(p => p.id === pid) : null;
}

function slotClick(zone, idx) {
  const current = getSlotPlayer(zone, idx);
  if (current) {
    showSlotOptions(current, zone, idx);
  } else {
    showPlayerPicker(zone, idx);
  }
}

function showPlayerPicker(zone, idx) {
  const available = players.filter(p => !p.onField)
    .sort((a, b) => a.totalFieldSeconds - b.totalFieldSeconds);

  if (players.length === 0) {
    alert('Add players to your squad first!');
    return;
  }
  if (available.length === 0) {
    alert('All players are already on the field!');
    return;
  }

  const posLabel = POS_LABELS[`${zone}-${idx}`] || zone.toUpperCase();
  document.getElementById('modalTitle').textContent = `ASSIGN — ${posLabel}`;
  const body = document.getElementById('modalBody');
  body.innerHTML = '';

  available.forEach(p => {
    const div = document.createElement('div');
    div.className = 'modal-player';
    div.innerHTML = `
      <div class="bench-avatar" style="width:38px;height:38px;font-size:10px;flex-shrink:0">${displayName(p.name)}</div>
      <div class="bench-info">
        <div class="bench-name">${p.name}</div>
        <div class="bench-status">Bench · Total played: ${formatTime(p.totalFieldSeconds)}</div>
      </div>
    `;
    div.onclick = () => placePlayer(p.id, zone, idx);
    body.appendChild(div);
  });

  document.getElementById('modalActions').innerHTML =
    `<button class="btn-cancel" onclick="closeModal()">Cancel</button>`;
  document.getElementById('pickModal').classList.add('show');
}

function showSlotOptions(player, zone, idx) {
  const cc        = colorClass(player);
  const spellColor = cc === 'red' ? 'var(--red)' : cc === 'orange' ? 'var(--orange)' : 'var(--accent)';

  document.getElementById('modalTitle').textContent = player.name.toUpperCase();
  document.getElementById('modalBody').innerHTML = `
    <div style="padding:16px 12px;text-align:center">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);letter-spacing:1.5px;margin-bottom:6px">CURRENT SPELL</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:${spellColor};line-height:1">${formatTime(player.currentSpellSeconds)}</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);margin-top:8px">Total field time: ${formatTime(player.totalFieldSeconds)}</div>
    </div>
  `;
  document.getElementById('modalActions').innerHTML = `
    <button class="btn-remove" onclick="removePlayer('${zone}',${idx})">Sub Off</button>
    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
  `;
  document.getElementById('pickModal').classList.add('show');
}

function placePlayer(playerId, zone, idx) {
  SLOTS[zone][idx] = playerId;
  const p = players.find(pl => pl.id === playerId);
  p.onField = true;
  p.slot    = `${zone}-${idx}`;
  // Reset spell timer — fresh start on field
  p.currentSpellSeconds = 0;
  closeModal();
  updateAll();
}

function removePlayer(zone, idx) {
  const pid = SLOTS[zone][idx];
  if (pid !== null) {
    const p = players.find(pl => pl.id === pid);
    if (p) {
      p.onField = false;
      p.slot    = null;
      // Reset spell — they'll start fresh next time they come on
      p.currentSpellSeconds = 0;
    }
  }
  SLOTS[zone][idx] = null;
  closeModal();
  updateAll();
}

function closeModal() {
  document.getElementById('pickModal').classList.remove('show');
}

// ── Render ─────────────────────────────────────────────────────────────────

function updateAll() {
  // Timer display
  const td = document.getElementById('timerDisplay');
  td.textContent = formatTime(gameSeconds);
  td.className   = 'timer-display';
  if      (gameSeconds >= 600) td.classList.add('danger');
  else if (gameSeconds >= 300) td.classList.add('warning');

  // Pitch slots
  Object.keys(SLOTS).forEach(zone => {
    SLOTS[zone].forEach((pid, idx) => {
      const slotEl = document.getElementById(`slot-${zone}-${idx}`);
      const tipEl  = document.getElementById(`tip-${zone}-${idx}`);
      if (!slotEl) return;

      if (pid !== null) {
        const p = players.find(pl => pl.id === pid);
        if (!p) { SLOTS[zone][idx] = null; return; }
        const cc = colorClass(p);
        // Update in place to avoid losing event listeners on parent
        slotEl.className = `player-token${cc ? ' ' + cc : ''}`;
        slotEl.id        = `slot-${zone}-${idx}`;
        slotEl.innerHTML = `
          <span class="p-name">${displayName(p.name)}</span>
          <span class="p-time">${formatTime(p.currentSpellSeconds)}</span>
        `;
        if (tipEl) tipEl.textContent = p.name;
      } else {
        if (slotEl.classList.contains('player-token')) {
          slotEl.className = 'empty-slot';
          slotEl.id        = `slot-${zone}-${idx}`;
          slotEl.innerHTML = '';
        }
        if (tipEl) tipEl.textContent = '';
      }
    });
  });

  // Sidebar bench list
  const benchList = document.getElementById('benchList');
  benchList.innerHTML = '';

  if (players.length === 0) {
    benchList.innerHTML = '<div class="empty-squad-msg">Add players above<br>to build your squad.</div>';
  } else {
    const onField = players.filter(p => p.onField);
    const onBench = players.filter(p => !p.onField);
    [...onField, ...onBench].forEach(p => {
      const cc  = colorClass(p);
      const div = document.createElement('div');
      div.className = `bench-player${p.onField ? ' on-field' + (cc ? ' ' + cc : '') : ''}`;
      div.innerHTML = `
        <div class="bench-avatar ${cc}">${displayName(p.name)}</div>
        <div class="bench-info">
          <div class="bench-name">${p.name}</div>
          <div class="bench-status">${p.onField
            ? `<span class="tag-on">ON FIELD</span>`
            : `Bench · Total: ${formatTime(p.totalFieldSeconds)}`
          }</div>
        </div>
        <div class="bench-time ${cc}">${p.onField ? formatTime(p.currentSpellSeconds) : ''}</div>
        ${!p.onField
          ? `<button class="bench-remove-btn" title="Remove from squad" onclick="removePlayerFromSquad(${p.id})">✕</button>`
          : `<div style="width:20px"></div>`
        }
      `;
      benchList.appendChild(div);
    });
  }

  // Stats
  const onFieldPlayers = players.filter(p => p.onField);
  const warn = onFieldPlayers.filter(p => p.currentSpellSeconds >= 300 && p.currentSpellSeconds < 600).length;
  const crit = onFieldPlayers.filter(p => p.currentSpellSeconds >= 600).length;

  document.getElementById('statOnField').textContent = `${onFieldPlayers.length} / 7`;
  document.getElementById('statOrange').textContent  = warn;
  document.getElementById('statRed').textContent     = crit;
  document.getElementById('benchCount').textContent  = players.length;
}

// ── Init ───────────────────────────────────────────────────────────────────
updateAll();

document.getElementById('pickModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
